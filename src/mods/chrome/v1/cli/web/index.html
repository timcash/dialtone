<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chrome v1 Service</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #dbeafe 0%, #eff6ff 40%, #ffffff 100%);
        color: #0f172a;
        font-family: "Iosevka", "Menlo", monospace;
      }
      main {
        border: 1px solid #cbd5e1;
        border-radius: 14px;
        padding: 22px;
        background: #ffffffcc;
        backdrop-filter: blur(4px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.15rem;
      }
      p {
        margin: 0;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>chrome/v1 embedded web server</h1>
      <p>Service is up. Check <code>/healthz</code> and <code>/tabs</code>.</p>
    </main>
  </body>
</html>
