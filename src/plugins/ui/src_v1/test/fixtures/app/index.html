<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI src_v1 fixture</title>
  </head>
  <body>
    <div id="app">
      <nav aria-label="Global Menu">
        <div aria-label="Global Menu Panel" hidden></div>
      </nav>

      <section id="ui-hero-stage" class="fullscreen" aria-label="Hero Section"></section>
      <section
        id="ui-three-fullscreen-stage"
        class="fullscreen"
        aria-label="Three Fullscreen Section"
        hidden
      ></section>
      <section
        id="ui-three-calculator-stage"
        class="calculator"
        aria-label="Three Calculator Section"
        hidden
      ></section>
      <section
        id="ui-table-table"
        class="calculator"
        aria-label="Table Section"
        hidden
      ></section>
      <section
        id="ui-camera-video"
        class="fullscreen"
        aria-label="Camera Section"
        hidden
      ></section>
      <section
        id="ui-docs-docs"
        class="fullscreen"
        aria-label="Docs Section"
        hidden
      ></section>
      <section
        id="ui-terminal-xterm"
        class="calculator"
        aria-label="Terminal Section"
        hidden
      ></section>
      <section
        id="ui-settings-button-list"
        class="fullscreen"
        aria-label="Settings Section"
        hidden
      ></section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
