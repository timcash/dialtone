<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dialtone Relay Tracker</title>
  <style>
    body { font-family: sans-serif; margin: 24px; color: #111; }
    h1 { margin: 0 0 12px 0; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    input, button { padding: 8px; font-size: 14px; }
    table { border-collapse: collapse; width: 100%; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
    th { background: #f5f5f5; }
    .muted { color: #666; font-size: 12px; }
    .row { margin: 4px 0; }
  </style>
</head>
<body>
  <h1>Dialtone Relay Tracker</h1>
  <div class="controls">
    <input id="who" placeholder="who (name)" />
    <input id="topic" placeholder="topic" value="swarm-v3" />
    <input id="port" placeholder="port" value="19001" />
    <button id="ping">Register/Ping</button>
  </div>

  <div class="row muted" id="status">status: idle</div>
  <div class="row muted" id="self">self: -</div>

  <table>
    <thead>
      <tr>
        <th>IP</th>
        <th>Port</th>
        <th>Who</th>
        <th>Topic</th>
        <th>Last Seen (UTC)</th>
        <th>First Seen (UTC)</th>
        <th>Hits</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <script>
    const whoInput = document.getElementById('who');
    const topicInput = document.getElementById('topic');
    const portInput = document.getElementById('port');
    const statusEl = document.getElementById('status');
    const selfEl = document.getElementById('self');
    const rowsEl = document.getElementById('rows');

    whoInput.value = localStorage.getItem('relay_who') || '';
    topicInput.value = localStorage.getItem('relay_topic') || 'swarm-v3';
    portInput.value = localStorage.getItem('relay_port') || '19001';

    async function register() {
      const who = whoInput.value.trim() || 'anonymous';
      const topic = topicInput.value.trim() || 'swarm-v3';
      const port = Number(portInput.value || 0) || 0;

      localStorage.setItem('relay_who', who);
      localStorage.setItem('relay_topic', topic);
      localStorage.setItem('relay_port', String(port));

      const resp = await fetch('/api/register', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ who, topic, port })
      });
      return resp.json();
    }

    async function refreshTable(topic) {
      const resp = await fetch('/api/peers?topic=' + encodeURIComponent(topic));
      const data = await resp.json();
      rowsEl.innerHTML = '';
      for (const p of data.peers || []) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.ip || ''}</td>
          <td>${p.port || 0}</td>
          <td>${p.who || ''}</td>
          <td>${p.topic || ''}</td>
          <td>${p.lastSeen || ''}</td>
          <td>${p.firstSeen || ''}</td>
          <td>${p.hits || 0}</td>
        `;
        rowsEl.appendChild(tr);
      }
    }

    async function tick() {
      try {
        const data = await register();
        statusEl.textContent = 'status: ok';
        selfEl.textContent = `self: ${data?.self?.ip || '-'}:${data?.self?.port || 0} as ${data?.self?.who || '-'}`;
        await refreshTable(topicInput.value.trim() || 'swarm-v3');
      } catch (err) {
        statusEl.textContent = 'status: error - ' + err;
      }
    }

    document.getElementById('ping').addEventListener('click', tick);
    tick();
    setInterval(tick, 3000);
  </script>
</body>
</html>
