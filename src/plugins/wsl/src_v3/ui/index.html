<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WSL Node Manager</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div id="app">
      <header aria-label="App Header">
        <h1>dialtone.wsl <span id="app-version"></span></h1>
      </header>

      <nav aria-label="Global Menu">
        <div aria-label="Global Menu Panel" hidden></div>
      </nav>

      <!-- HERO SECTION -->
      <section id="home" class="fullscreen" aria-label="WSL Hero Section">
        <div class="viz-container overlay-primary"></div>
        <form class="mode-form" data-mode-form="home" aria-label="Home Mode Form" hidden></form>
        <aside class="marketing-overlay overlay-legend" aria-label="WSL Hero Legend">
          <h2 aria-label="WSL Hero Title">WSL Node Explorer</h2>
          <p data-typing-subtitle></p>
        </aside>
      </section>

      <!-- DOCS SECTION -->
      <section id="docs" class="fullscreen" aria-label="WSL Documentation Section" hidden>
        <div class="settings-container overlay-primary" aria-label="WSL Documentation Content">
          <h1 aria-label="WSL Documentation Title">WSL & Plugin Architecture</h1>
          <p>Full control over your Windows Subsystem for Linux nodes.</p>
        </div>
        <form class="mode-form" data-mode-form="docs" aria-label="Docs Mode Form" hidden></form>
        <aside class="docs-legend overlay-legend" aria-label="WSL Documentation Legend"></aside>
      </section>

      <!-- TABLE SECTION -->
      <section id="table" class="calculator" aria-label="WSL Spreadsheet Section" hidden>
        <div class="explorer-container overlay-primary">
          <div class="explorer-column">
            <div class="spreadsheet-wrapper">
              <table aria-label="WSL Process Table" class="telemetry-table">
                <thead>
                  <tr>
                    <th>NAME</th>
                    <th>STATE</th>
                    <th>VERSION</th>
                    <th>MEMORY</th>
                    <th>DISK</th>
                    <th style="text-align: right; width: 280px;">ACTIONS</th>
                  </tr>
                </thead>
                <tbody id="node-rows">
                  <tr><td colspan="6" style="padding: 20px; text-align: center; opacity: 0.5;">Initializing...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <form class="mode-form" data-mode-form="table" aria-label="Table Mode Form">
          <button type="button" aria-label="Table Thumb 1">Refresh</button>
          <button type="button" aria-label="Table Thumb 2">Spawn</button>
          <button type="button" aria-label="Table Thumb 3"></button>
          <button type="button" aria-label="Table Thumb 4"></button>
          <button type="button" aria-label="Table Thumb 5"></button>
          <button type="button" aria-label="Table Thumb 6"></button>
          <button type="button" aria-label="Table Thumb 7"></button>
          <button type="button" aria-label="Table Thumb 8"></button>
          <button type="button" aria-label="Table Mode">Mode: Browse</button>
          <input type="text" aria-label="Table Query Input" placeholder="Filter nodes" />
          <button type="button" aria-label="Table Submit">Apply</button>
        </form>
        <aside class="table-legend overlay-legend" aria-label="WSL Table Legend"></aside>
      </section>

      <!-- SETTINGS SECTION -->
      <section id="settings" class="fullscreen" aria-label="Settings Section" hidden>
        <div class="settings-container overlay-primary" aria-label="Settings Content">
          <h1 aria-label="Settings Title">Configuration</h1>
          <p>Modify your WSL plugin behavior here.</p>
        </div>
        <form class="mode-form" data-mode-form="settings" aria-label="Settings Mode Form" hidden></form>
        <aside class="settings-legend overlay-legend" aria-label="Settings Legend"></aside>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
