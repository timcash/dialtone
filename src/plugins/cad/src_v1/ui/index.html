<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="application-name" content="Dialtone CAD" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CAD src_v1</title>
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icons/cad-pwa.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header aria-label="App Header">
        <h1>dialtone.cad <span id="app-version"></span></h1>
      </header>

      <nav aria-label="Global Menu">
        <div aria-label="Global Menu Panel" hidden></div>
      </nav>

      <section id="cad-three-stage" class="fullscreen" aria-label="CAD Section">
        <canvas class="three-stage overlay-primary" aria-label="CAD Stage" data-model-state="booting" data-generation="0"></canvas>

        <form class="mode-form" data-mode-form="cad-three-stage" aria-label="CAD Mode Form" data-busy="true" data-generation="0">
          <button type="button" aria-label="CAD Thumb 1">Scale +</button>
          <button type="button" aria-label="CAD Thumb 2">Scale -</button>
          <button type="button" aria-label="CAD Thumb 3">Teeth +</button>
          <button type="button" aria-label="CAD Thumb 4">Teeth -</button>
          <button type="button" aria-label="CAD Thumb 5">Bore +</button>
          <button type="button" aria-label="CAD Thumb 6">Bore -</button>
          <button type="button" aria-label="CAD Thumb 7">Holes +</button>
          <button type="button" aria-label="CAD Thumb 8">Download</button>
          <button type="button" aria-label="CAD Mode">Mode: Gear</button>
          <input type="text" aria-label="CAD Input" placeholder="od:92 teeth:24 holes:6" />
          <button type="submit" aria-label="CAD Submit">Apply</button>
        </form>

        <aside class="cad-legend overlay-legend" aria-label="CAD Legend">
          <div class="cad-legend-title">
            <h2>Parametric Gear</h2>
          </div>
          <dl class="cad-stats">
            <div><dt>outer</dt><dd id="cad-stat-outer">80 mm</dd></div>
            <div><dt>inner</dt><dd id="cad-stat-inner">20 mm</dd></div>
            <div><dt>teeth</dt><dd id="cad-stat-teeth">20</dd></div>
            <div><dt>holes</dt><dd id="cad-stat-holes">4</dd></div>
            <div><dt>status</dt><dd id="cad-stat-status" aria-label="CAD Model Status" data-state="booting" data-generation="0">warming</dd></div>
            <div><dt>mesh</dt><dd id="cad-stat-mesh">booting</dd></div>
          </dl>
        </aside>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
