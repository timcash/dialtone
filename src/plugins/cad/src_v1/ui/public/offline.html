<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dialtone CAD Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #242424 0%, #050505 58%);
        color: #ffffff;
        font: 16px/1.5 "Segoe UI", sans-serif;
      }
      main {
        width: min(30rem, calc(100vw - 3rem));
        padding: 2rem;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(10, 10, 10, 0.85);
      }
      p {
        color: rgba(255,255,255,0.72);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dialtone CAD</h1>
      <p>The CAD shell is cached, but the live backend is offline right now. Reconnect and reload to generate a fresh model.</p>
    </main>
  </body>
</html>
