    <circle cx="22" cy="17" r="4.5" fill="#F87171"/>
    <circle cx="40" cy="17" r="4.5" fill="#FBBF24"/>
    <circle cx="58" cy="17" r="4.5" fill="#34D399"/>
    <text x="92" y="22" text-anchor="end" fill="#94A3B8" font-family="'IBM Plex Mono', 'Cascadia Code', monospace" font-size="14">dialtone&gt;</text>

    <text x="0" y="102" fill="#F8FAFC" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="78" font-weight="700" letter-spacing="8">DIALTONE</text>
    <text x="0" y="148" fill="#9FB2C8" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="26" letter-spacing="1.6">task-first CLI control plane for plugins, services, and remote ops</text>
